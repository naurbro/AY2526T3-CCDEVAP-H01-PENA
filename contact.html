<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Atreyu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Atreyu Peña</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="contact.html">Call Me!</a></li>
                <li><a href="contacteme.html">Español</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Social Media Section -->
        <section>
            <h2>Find Me On...</h2>

            <p>
                <img src="linkedin.png" alt="LinkedIn icon" width="30" height="30">
                <a href="https://www.linkedin.com/in/atreyu-pe%C3%B1a-02091838b/" target="_blank" rel="noopener">
                    LinkedIn
                </a>
            </p>

            <p>
                <img src="facebook.png" alt="Facebook icon" width="30" height="30">
                <a href="https://www.facebook.com/AtreyuPreobrazhensky/" target="_blank" rel="noopener">
                    Facebook
                </a>
            </p>
        </section>

        <!-- Contact Form Section -->
        <section>
            <h2>Send Me a Message</h2>

            <form action="mailto:atreyu_vince_pena@dlsu.edu.ph" method="post" enctype="text/plain">

                <!-- Name field -->
                <p>
                    <label for="name">Your Name:</label><br>
                    <input type="text" id="name" name="name" size="40" required>
                </p>

                <!-- Checkboxes for platforms -->
                <fieldset>
                    <legend>What platforms do you use?</legend>

                    <p>
                        <input type="checkbox" id="phonecall" name="platform" value="Phone Call">
                        <label for="phonecall">Phone Call</label>
                    </p>

                    <p>
                        <input type="checkbox" id="linkedin-platform" name="platform" value="LinkedIn">
                        <label for="linkedin-platform">LinkedIn</label>
                    </p>

                    <p>
                        <input type="checkbox" id="facebook-platform" name="platform" value="Facebook">
                        <label for="facebook-platform">Facebook</label>
                    </p>
                </fieldset>

                <!-- Radio buttons for purpose -->
                <fieldset>
                    <legend>What's this about?</legend>

                    <p>
                        <input type="radio" id="professional" name="purpose" value="Professional">
                        <label for="professional">🧑‍💼 Professional 🧑‍💼</label>
                    </p>

                    <p>
                        <input type="radio" id="vibe" name="purpose" value="Vibe">
                        <label for="vibe">🎧 Just Vibin' 🎧</label>
                    </p>
                </fieldset>

                <!-- Submit button -->
                <p>
                    <button type="submit">Send Message</button>
                </p>

            </form>
        </section>

        <p><i>Thanks for reaching out!</i></p>
    </main>

    <hr>

    <footer>
        <p>© 2026 Atreyu Peña, CCDEVAP, DLSU</p>
    </footer>
</body>

</html>
