<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Atreyu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Atreyu Peña</a></li>
                <li><a href="espanol.html">Inicio</a></li>
                <li><a href="sobremi.html">Sobre Mí</a></li>
                <li><a href="contacteme.html">¡Contáctame!</a></li>
                <li><a href="contacteme.html">English</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Encuéntrame En...</h2>

            <p>
                <img src="linkedin.png" alt="Icono de LinkedIn" width="30" height="30">
                <a href="https://www.linkedin.com/in/atreyu-pe%C3%B1a-02091838b/" target="_blank" rel="noopener">
                    LinkedIn
                </a>
            </p>

            <p>
                <img src="facebook.png" alt="Icono de Facebook" width="30" height="30">
                <a href="https://www.facebook.com/AtreyuPreobrazhensky/" target="_blank" rel="noopener">
                    Facebook
                </a>
            </p>
        </section>

        <section>
            <h2>Envíame un Mensaje</h2>

            <form action="mailto:atreyu_vince_pena@dlsu.edu.ph" method="post" enctype="text/plain">

                <p>
                    <label for="name">Tu Nombre:</label><br>
                    <input type="text" id="name" name="name" size="40" required>
                </p>

                <fieldset>
                    <legend>¿Qué plataformas usas?</legend>

                    <p>
                        <input type="checkbox" id="phonecall" name="platform" value="Phone Call">
                        <label for="phonecall">Llamada Telefónica</label>
                    </p>

                    <p>
                        <input type="checkbox" id="linkedin-platform" name="platform" value="LinkedIn">
                        <label for="linkedin-platform">LinkedIn</label>
                    </p>

                    <p>
                        <input type="checkbox" id="facebook-platform" name="platform" value="Facebook">
                        <label for="facebook-platform">Facebook</label>
                    </p>
                </fieldset>

                <fieldset>
                    <legend>¿De qué se trata?</legend>

                    <p>
                        <input type="radio" id="professional" name="purpose" value="Professional">
                        <label for="professional">🧑‍💼 Profesional 🧑‍💼</label>
                    </p>

                    <p>
                        <input type="radio" id="vibe" name="purpose" value="Vibe">
                        <label for="vibe">🎧 Solo Relajándome 🎧</label>
                    </p>
                </fieldset>

                <p>
                    <button type="submit">Enviar Mensaje</button>
                </p>

            </form>
        </section>

        <p><i>¡Gracias por contactarme!</i></p>
    </main>

    <hr>

    <footer>
        <p>© 2026 Atreyu Peña, CCDEVAP, DLSU</p>
    </footer>
</body>

</html>
